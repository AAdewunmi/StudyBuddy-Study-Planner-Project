name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: studybuddy_test
          POSTGRES_USER: studybuddy
          POSTGRES_PASSWORD: studybuddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U studybuddy -d studybuddy_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://studybuddy:studybuddy@localhost:5432/studybuddy_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check Django configuration
        run: python manage.py check

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run Ruff
        run: python -m ruff check .

      - name: Check formatting
        run: python -m black . --check

      - name: Run tests
        run: |
          set +e
          python -m pytest
          status=$?
          if [ "$status" -eq 5 ]; then
            echo "No tests collected."
            exit 0
          fi
          exit "$status"
