name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: studybuddy_test
          POSTGRES_USER: studybuddy
          POSTGRES_PASSWORD: studybuddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U studybuddy -d studybuddy_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://studybuddy:studybuddy@localhost:5432/studybuddy_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check Django configuration
        run: python manage.py check

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run Ruff
        run: python -m ruff check .

      - name: Check formatting
        run: python -m black . --check

      - name: Check import sorting
        run: python -m isort . --check-only

      - name: Build Docker image
        run: docker build -t studybuddy-ci .

      - name: Run tests
        run: python -m pytest --cov=apps --cov=config --cov-report=xml -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
